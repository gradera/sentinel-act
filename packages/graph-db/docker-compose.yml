# Local Neo4j 5.13+ instance for @sentinel-act/graph-db development and
# manual verification (migrate/seed/cypher-shell) — NOT used by
# test:integration, which manages its own disposable container per test
# file via testcontainers. This one is for a Neo4j you keep running while
# you work, and for the manual Definition-of-Done check (spec §12).
#
# Reads SENTINEL_NEO4J_USER / SENTINEL_NEO4J_PASSWORD from a `.env` file
# in this same directory (copy .env.example -> .env first) so the
# Node-side config and the container's NEO4J_AUTH always match.
#
# Usage (from packages/graph-db/):
#   docker compose up -d
#   docker compose logs -f neo4j        # wait for "Started."
#   docker compose down                 # stop, keep data volume
#   docker compose down -v              # stop, wipe data volume
services:
  neo4j:
    image: neo4j:5.23-community
    container_name: sentinel-act-graph-db-neo4j
    ports:
      - "7474:7474" # HTTP / Neo4j Browser
      - "7687:7687" # Bolt
    environment:
      NEO4J_AUTH: ${SENTINEL_NEO4J_USER:-neo4j}/${SENTINEL_NEO4J_PASSWORD:-sentinel-local-dev}
    volumes:
      - graph-db-neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  graph-db-neo4j-data:
